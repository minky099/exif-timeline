# HTTP: 9003 (LAN 간편 접속 · 공유시트 저장은 보안 컨텍스트가 아니라 개별 저장만 가능)
server {
    listen 9003;
    listen [::]:9003;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
    # 아이폰 인증서 신뢰용: http://<IP>:9003/cert 로 받아 프로파일 설치
    location = /cert {
        alias /etc/nginx/certs/cert.pem;
        default_type application/x-x509-ca-cert;
    }
}

# HTTPS: 9443 (자체서명 · 보안 컨텍스트라 공유시트 '일괄 저장' 가능)
# 인증서는 /docker-entrypoint.d/40-selfsigned-cert.sh 가 시작 전에 생성한다.
server {
    listen 9443 ssl;
    listen [::]:9443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
