server {
    listen 9003;
    listen [::]:9003;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 단일 HTML 정적 서빙
    location / {
        try_files $uri $uri/ =404;
    }

    # HTML은 캐시하지 않아 갱신이 바로 반영되도록
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 헬스체크용 (docker healthcheck에서 사용)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
